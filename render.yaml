# render.yaml — Render.com deployment config for the SkillSwap backend
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: skillswap-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: NODE_ENV=development npm install --legacy-peer-deps && npm run build
    startCommand: node server/server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: VITE_API_URL
        sync: false
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

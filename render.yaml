# render.yaml — Render.com deployment config for the SkillSwap backend
# Docs: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: skillswap-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: FRONTEND_URL
        sync: false          # Paste your Netlify URL here after deploying (e.g. https://skillswap.netlify.app)
